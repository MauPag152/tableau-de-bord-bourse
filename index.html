<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Régression linéaire AAPL sur 1 an</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #stats { margin-top: 20px; }
    table { border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 4px 8px; font-size: 12px; }
    th { background: #f0f0f0; }
  </style>
</head>
<body>
<h2>Graphique de régression linéaire – AAPL (252 jours)</h2>
<canvas id="chart" width="1200" height="500"></canvas>

<div id="stats"></div>

<script>
// ---------- PARAMÈTRES ----------
const ticker = "AAPL";
const nbJours = 252;

// ---------- FONCTIONS UTILITAIRES ----------
function mean(arr) {
  return arr.reduce((a, b) => a + b, 0) / arr.length;
}

function stdDev(arr) {
  const m = mean(arr);
  const variance = arr.reduce((s, x) => s + Math.pow(x - m, 2), 0) / (arr.length - 1);
  return Math.sqrt(variance);
}

// Régression linéaire y = a*x + b
function linearRegression(xs, ys) {
  const n = xs.length;
  const meanX = mean(xs);
  const meanY = mean(ys);
  let num = 0;
  let den = 0;
  for (let i = 0; i < n; i++) {
    num += (xs[i] - meanX) * (ys[i] - meanY);
    den += Math.pow(xs[i] - meanX, 2);
  }
  const a = num / den;           // pente
  const b = meanY - a * meanX;   // ordonnée à l’origine

  // Erreur type de la régression (résidus)
  let seNum = 0;
  for (let i = 0; i < n; i++) {
    const yHat = a * xs[i] + b;
    seNum += Math.pow(ys[i] - yHat, 2);
  }
  const se = Math.sqrt(seNum / (n - 2));

  return { a, b, se };
}

// ---------- RÉCUPÉRATION DES DONNÉES YAHOO FINANCE ----------
async function fetchAAPL() {
  const now = Math.floor(Date.now() / 1000);
  const unAnAvant = now - 365 * 24 * 60 * 60;

  // API CSV historique Yahoo Finance (données quotidiennes ajustées)
  const url = `https://query1.finance.yahoo.com/v7/finance/download/${ticker}` +
              `?period1=${unAnAvant}&period2=${now}&interval=1d&events=history&includeAdjustedClose=true`;

  const response = await fetch(url);
  const csv = await response.text();

  const lignes = csv.trim().split("\n").slice(1); // on enlève l’en‑tête
  const rows = lignes.map(l => l.split(",")).filter(r => r[1] !== "null" && r[4] !== "null");

  // On prend les nbJours derniers en cas de plus d’un an
  const data = rows.slice(-nbJours);

  const dates = [];
  const closes = [];

  data.forEach(r => {
    const dateStr = r[0];
    const close = parseFloat(r[4]); // Close ajusté
    if (!isNaN(close)) {
      dates.push(dateStr);
      closes.push(close);
    }
  });

  return { dates, closes };
}

// ---------- CALCULS ET GRAPHIQUE ----------
async function main() {
  const { dates, closes } = await fetchAAPL();

  if (dates.length === 0) {
    alert("Impossible de charger les données AAPL.");
    return;
  }

  // Index temporel 0..n-1
  const xs = dates.map((_, i) => i);
  const ys = closes;

  // Rendements journaliers log
  const returns = [];
  for (let i = 1; i < ys.length; i++) {
    returns.push(Math.log(ys[i] / ys[i - 1]));
  }

  const avgDailyReturn = mean(returns);
  const stdDaily = stdDev(returns);
  const annualVol = stdDaily * Math.sqrt(252);

  const reg = linearRegression(xs, ys);
  const a = reg.a;
  const b = reg.b;
  const se = reg.se;

  // Préparation des séries pour le graphique
  const regressionLine = xs.map((x, i) => ({ x: i, y: a * x + b }));

  // Lignes de tendance ±1 et ±2 erreurs types (sur la valeur, pas sur le log)
  const trendPlus1 = xs.map((x, i) => ({ x: i, y: a * x + b + se }));
  const trendMinus1 = xs.map((x, i) => ({ x: i, y: a * x + b - se }));
  const trendPlus2 = xs.map((x, i) => ({ x: i, y: a * x + b + 2 * se }));
  const trendMinus2 = xs.map((x, i) => ({ x: i, y: a * x + b - 2 * se }));

  // ---------- GRAPHIQUE CHART.JS ----------
  const ctx = document.getElementById('chart').getContext('2d');

  const chart = new Chart(ctx, {
    type: 'scatter',
    data: {
      datasets: [
        {
          label: 'Cours de clôture',
          data: ys.map((y, i) => ({ x: i, y })),
          borderColor: 'rgba(0,0,0,0.0)',
          backgroundColor: 'rgba(0,0,0,0.6)',
          pointRadius: 2,
        },
        {
          label: 'Tendance (Régression)',
          data: regressionLine,
          showLine: true,
          borderColor: 'black',
          borderWidth: 2,
          pointRadius: 0,
        },
        {
          label: 'Tendance +1σ',
          data: trendPlus1,
          showLine: true,
          borderColor: 'orange',
          borderWidth: 1,
          borderDash: [5, 5],
          pointRadius: 0,
        },
        {
          label: 'Tendance -1σ',
          data: trendMinus1,
          showLine: true,
          borderColor: 'blue',
          borderWidth: 1,
          borderDash: [5, 5],
          pointRadius: 0,
        },
        {
          label: 'Tendance +2σ',
          data: trendPlus2,
          showLine: true,
          borderColor: 'red',
          borderWidth: 1,
          borderDash: [5, 5],
          pointRadius: 0,
        },
        {
          label: 'Tendance -2σ',
          data: trendMinus2,
          showLine: true,
          borderColor: 'green',
          borderWidth: 1,
          borderDash: [5, 5],
          pointRadius: 0,
        }
      ]
    },
    options: {
      responsive: true,
      scales: {
        x: {
          type: 'linear',
          position: 'bottom',
          ticks: {
            callback: function(value, index) {
              const i = Math.round(value);
              if (i >= 0 && i < dates.length && (i % 20 === 0 || i === dates.length - 1)) {
                return dates[i];
              }
              return '';
            }
          },
          title: {
            display: true,
            text: 'Jour de bourse'
          }
        },
        y: {
          title: {
            display: true,
            text: 'Prix de clôture (USD)'
          }
        }
      },
      plugins: {
        legend: { position: 'top' },
        tooltip: {
          callbacks: {
            title: function(items) {
              const i = items[0].parsed.x;
              if (i >= 0 && i < dates.length) return dates[i];
              return '';
            }
          }
        }
      }
    }
  });

  // ---------- TABLEAU DE STATISTIQUES ----------
  const startDate = dates[0];
  const endDate = dates[dates.length - 1];
  const variationTotale = (ys[ys.length - 1] / ys[0]) - 1;
  const variationJourMoy = avgDailyReturn;

  const statsDiv = document.getElementById('stats');
  statsDiv.innerHTML = `
    <h3>Statistiques – ${ticker}</h3>
    <table>
      <tr><th>Ticker</th><td>${ticker}</td></tr>
      <tr><th>Nombre de jours</th><td>${dates.length}</td></tr>
      <tr><th>Date début (≈1 an)</th><td>${startDate}</td></tr>
      <tr><th>Date fin (aujourd'hui)</th><td>${endDate}</td></tr>
      <tr><th>Variation totale</th><td>${(variationTotale * 100).toFixed(2)} %</td></tr>
      <tr><th>Variation/jour (moyenne, log)</th><td>${(variationJourMoy * 100).toFixed(4)} %</td></tr>
      <tr><th>Écart type journalier (log)</th><td>${(stdDaily * 100).toFixed(4)} %</td></tr>
      <tr><th>Volatilité annuelle (≈ √252)</th><td>${(annualVol * 100).toFixed(2)} %</td></tr>
      <tr><th>Pente (a)</th><td>${a.toFixed(6)}</td></tr>
      <tr><th>Ordonnée (b)</th><td>${b.toFixed(4)}</td></tr>
      <tr><th>Erreur type de la régression</th><td>${se.toFixed(4)}</td></tr>
    </table>
  `;
}

main();
</script>
</body>
</html>
